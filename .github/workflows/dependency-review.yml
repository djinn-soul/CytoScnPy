# Dependency Review Workflow
# Scans for vulnerable dependencies in PRs and performs license compliance checks
name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4 # Keep version tag for easier updates
        with:
          # Retry if dependency graph snapshots aren't ready yet
          retry-on-snapshot-warnings: true
          # Fail on high and critical severity vulnerabilities
          fail-on-severity: high
          # Only check runtime dependencies
          fail-on-scopes: runtime
          # Comment on PR with vulnerability summary
          comment-summary-in-pr: always
          # License check - allow common permissive licenses
          # Allow known unavailable vulnerabilities for Python 3.8 support
          # Allow known unavailable vulnerabilities for Python 3.8 support:
          # setuptools path traversal, urllib3 redirect/proxy/decompression/streaming DoS,
          # filelock TOCTOU, pip path traversal (all require Py 3.9+ to fix)
          allow-ghsas: >-
            GHSA-5rjg-fvgr-3xxf,
            GHSA-g4mx-q9vg-27p4,
            GHSA-34jh-p97f-mpxf,
            GHSA-gm62-xv2j-4w53,
            GHSA-2xpw-w6gg-jr37,
            GHSA-pw2r-r8wx-5mcc,
            GHSA-4xh5-x5gv-qwph

          # License check - allow common permissive licenses
          allow-licenses: >-
            MIT,
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            MPL-2.0,
            0BSD,
            Unlicense,
            CC0-1.0,
            Python-2.0,
            PSF-2.0

          # Handle packages with unknown/complex licenses explicitly (PURL format required)
          allow-dependencies-licenses: >-
            pkg:pypi/cyclonedx-python-lib@*: Apache-2.0 AND Python-2.0,
            pkg:pypi/pyparsing@*: MIT AND Python-2.0,
            pkg:pypi/basedpyright@*: MIT

          # Warn on low OpenSSF scorecard
          warn-on-openssf-scorecard-level: 3
